<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVXP Rehearsal Console — Don't Stop Believin'</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05070d; --bg2:#0a0f1a;
  --cyan:#22e0ff; --cyan-dim:#0d8ba3;
  --amber:#ffb347; --amber-hot:#ffcf6b;
  --panel:rgba(16,24,40,0.55);
  --panel-edge:rgba(60,120,160,0.25);
  --text:#e7f4fb; --muted:#7d93a8;
  --glow-cyan:0 0 18px rgba(34,224,255,0.55);
  --glow-amber:0 0 22px rgba(255,179,71,0.6);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow:hidden}
body{
  background:
    radial-gradient(1200px 700px at 15% -10%, rgba(34,224,255,0.09), transparent 60%),
    radial-gradient(1000px 600px at 100% 110%, rgba(255,179,71,0.07), transparent 55%),
    var(--bg);
}
.hidden{display:none !important}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}

/* ===== Loader ===== */
#loader{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.loader-card{width:min(680px,92vw);background:var(--panel);border:1px solid var(--panel-edge);border-radius:18px;padding:34px 38px;backdrop-filter:blur(14px);box-shadow:0 20px 60px rgba(0,0,0,0.6)}
.loader-card h1{font-family:'Orbitron';font-weight:900;font-size:26px;letter-spacing:2px;color:var(--cyan);text-shadow:var(--glow-cyan)}
.loader-card .sub{color:var(--muted);margin:6px 0 22px;font-size:16px;letter-spacing:1px}
.drop{border:2px dashed var(--panel-edge);border-radius:14px;padding:22px;text-align:center;transition:.2s;margin-bottom:16px}
.drop.hot{border-color:var(--cyan);background:rgba(34,224,255,0.06)}
.drop p{color:var(--muted);font-size:15px}
.stemgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
.stemchip{padding:9px 6px;border-radius:9px;border:1px solid var(--panel-edge);text-align:center;font-size:13px;letter-spacing:1px;color:var(--muted)}
.stemchip.ok{border-color:var(--cyan-dim);color:var(--cyan);box-shadow:inset 0 0 12px rgba(34,224,255,0.12)}
.startbtn{width:100%;padding:14px;border-radius:12px;font-family:'Orbitron';font-weight:700;letter-spacing:2px;font-size:16px;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));color:#031015;box-shadow:var(--glow-cyan);opacity:.4;pointer-events:none;transition:.25s}
.startbtn.ready{opacity:1;pointer-events:auto}
.loaderr{color:var(--amber);font-size:14px;margin-top:12px;min-height:18px}
.loadstatus{color:var(--muted);font-size:13px;margin-top:8px;letter-spacing:1px}

/* ===== App shell ===== */
#app{position:fixed;inset:0;display:flex;flex-direction:column;padding:8px 12px 10px;gap:7px}

.apphead{display:flex;align-items:baseline;justify-content:space-between;flex-shrink:0;padding:2px 6px 4px;gap:16px;flex-wrap:wrap}
.apptitle{font-family:'Orbitron';font-weight:900;letter-spacing:3px;font-size:clamp(18px,1.9vw,26px);color:var(--cyan);text-shadow:var(--glow-cyan);text-transform:uppercase;white-space:nowrap}
.appmeta{display:flex;gap:8px;flex-wrap:wrap}
.metachip{font-family:'Orbitron';font-weight:700;font-size:11px;letter-spacing:2px;color:var(--amber-hot);border:1px solid var(--amber);border-radius:7px;padding:4px 10px;box-shadow:inset 0 0 10px rgba(255,179,71,0.12)}
.topbar{display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.mixer{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
.stem{background:var(--panel);border:1px solid var(--panel-edge);border-radius:11px;padding:7px 9px;backdrop-filter:blur(10px);display:flex;flex-direction:column;gap:5px}
.stem .name{font-family:'Orbitron';font-size:11px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase}
.wave{width:100%;height:30px;border-radius:6px;background:rgba(0,0,0,0.3);display:block}
.stem .row{display:flex;align-items:center;gap:6px}
.sbtn{font-size:10px;font-weight:700;letter-spacing:1px;padding:4px 7px;border-radius:6px;border:1px solid var(--panel-edge);color:var(--muted);transition:.15s}
.sbtn.on-mute{background:rgba(255,80,80,0.18);border-color:#ff5a5a;color:#ff9a9a}
.sbtn.on-solo{background:rgba(255,179,71,0.2);border-color:var(--amber);color:var(--amber-hot)}
.vol{flex:1;accent-color:var(--cyan);height:4px}

.transport{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--panel-edge);border-radius:11px;padding:7px 14px;backdrop-filter:blur(10px)}
.playbtn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--cyan-dim));color:#04121a;display:flex;align-items:center;justify-content:center;box-shadow:var(--glow-cyan);flex-shrink:0}
.playbtn svg{width:19px;height:19px}
.seekwrap{flex:1;position:relative;height:24px;display:flex;align-items:center}
.seek{position:absolute;inset:0;width:100%;height:100%;-webkit-appearance:none;background:transparent;cursor:pointer;z-index:3;margin:0}
.seek::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--cyan);box-shadow:var(--glow-cyan);margin-top:-5px}
.seek::-moz-range-thumb{width:14px;height:14px;border:none;border-radius:50%;background:var(--cyan);box-shadow:var(--glow-cyan)}
.seektrack{position:absolute;left:0;right:0;top:50%;height:5px;transform:translateY(-50%);background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
.seekfill{height:100%;width:0;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan))}
.markers{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:14px;pointer-events:none;z-index:2}
.marker{position:absolute;top:0;width:2px;height:14px;background:var(--amber);opacity:.5}
.time{font-family:'Orbitron';font-size:14px;letter-spacing:1px;color:var(--muted);min-width:130px;text-align:right}
.time b{color:var(--cyan)}

/* Main columns */
.main{flex:1;display:grid;grid-template-columns:70fr 30fr;gap:11px;min-height:0}

/* Left: lyrics */
.lyricpanel{background:var(--panel);border:1px solid var(--panel-edge);border-radius:16px;backdrop-filter:blur(12px);padding:20px 30px 26px;display:flex;flex-direction:column;min-height:0;position:relative;overflow:hidden}
.sectiontag{font-family:'Orbitron';font-weight:900;letter-spacing:4px;font-size:clamp(16px,2vw,26px);color:var(--amber);text-shadow:var(--glow-amber);text-transform:uppercase;margin-bottom:2px;flex-shrink:0}
.sectiontime{font-family:'Orbitron';font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:10px;flex-shrink:0}
.lyriclines{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;overflow:hidden;transition:opacity .35s, transform .35s}
.lyriclines.swap{opacity:0;transform:translateY(18px)}
.lline{transition:.3s;flex-shrink:0}
.lchords{display:flex;gap:14px;flex-wrap:wrap}
.lchord{font-family:'Orbitron';font-weight:700;color:var(--muted);letter-spacing:1px;transition:.2s}
.lchord.pad{color:var(--cyan)}
.lchord.active{color:var(--amber-hot);text-shadow:var(--glow-amber)}
.ltext{font-family:'Rajdhani';font-weight:600;line-height:1.1;color:#9fb4c6;letter-spacing:.5px;transition:color .25s}
.lline.active .ltext{color:#fff;text-shadow:0 0 20px rgba(34,224,255,0.35)}
.lline.instr .ltext{font-style:italic;color:#5f7488}
.nextsec{position:absolute;bottom:12px;right:22px;font-family:'Orbitron';font-size:11px;letter-spacing:2px;color:var(--muted);opacity:.7}

/* Right: controls — FIXED so chords always visible, no scroll */
.controls{display:flex;flex-direction:column;gap:9px;min-height:0}
.card{background:var(--panel);border:1px solid var(--panel-edge);border-radius:13px;backdrop-filter:blur(12px);padding:11px 13px;flex-shrink:0}
.card h3{font-family:'Orbitron';font-size:11px;letter-spacing:3px;color:var(--cyan);text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.card h3 .mini{font-size:10px;color:var(--muted);letter-spacing:1px}

/* Beat guide */
.beatgrid{display:flex;flex-direction:column;gap:5px}
.beatrow{display:grid;grid-template-columns:40px repeat(8,1fr);gap:4px;align-items:center}
.beatlabel{font-size:11px;letter-spacing:1px;color:var(--muted);font-weight:700}
.beatcell{height:14px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.06)}
.beatcell.on{background:rgba(34,224,255,0.22);border-color:var(--cyan-dim)}
.beatbeam{position:relative;height:7px;margin-top:7px;border-radius:4px;background:rgba(0,0,0,0.35);overflow:hidden}
.beambar{position:absolute;top:0;bottom:0;width:12.5%;background:linear-gradient(90deg,transparent,rgba(34,224,255,0.55),transparent);left:0}
.beatctrls{display:flex;gap:8px;margin-top:9px}
.tinybtn{font-size:11px;letter-spacing:1px;padding:5px 10px;border-radius:7px;border:1px solid var(--panel-edge);color:var(--muted)}
.tinybtn.on{color:var(--cyan);border-color:var(--cyan-dim);box-shadow:inset 0 0 10px rgba(34,224,255,0.15)}

/* Pads */
.padgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pad{position:relative;border-radius:11px;padding:12px 8px;text-align:center;border:1px solid var(--panel-edge);background:linear-gradient(160deg,rgba(255,255,255,0.04),rgba(0,0,0,0.15));transition:transform .08s, box-shadow .15s;user-select:none;overflow:hidden}
.pad .lbl{font-family:'Orbitron';font-weight:700;font-size:18px;letter-spacing:1px}
.pad .key{font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:3px}
.pad.drum .lbl{color:var(--cyan)}
.pad.chord .lbl{color:var(--amber-hot)}
.pad:active,.pad.hit{transform:scale(.94)}
.pad.hit.drum{box-shadow:var(--glow-cyan),inset 0 0 22px rgba(34,224,255,0.35);border-color:var(--cyan)}
.pad.hit.chord{box-shadow:var(--glow-amber),inset 0 0 22px rgba(255,179,71,0.35);border-color:var(--amber)}
.pad.live{border-color:var(--amber);box-shadow:0 0 16px rgba(255,179,71,0.4)}
.pad.live::after{content:'';position:absolute;inset:0;background:rgba(255,179,71,0.1);animation:livepulse 1.4s infinite;pointer-events:none}
@keyframes livepulse{0%,100%{opacity:.3}50%{opacity:.8}}

.instsel{display:flex;gap:8px;margin-top:9px}
.instbtn{flex:1;font-size:11px;letter-spacing:1px;padding:8px;border-radius:8px;border:1px solid var(--panel-edge);color:var(--muted);font-weight:600}
.instbtn.on{color:var(--amber-hot);border-color:var(--amber);box-shadow:inset 0 0 12px rgba(255,179,71,0.15)}

@media (max-width:1300px){ .main{grid-template-columns:64fr 36fr} }
@media (max-width:900px){
  .main{grid-template-columns:1fr;overflow-y:auto}
  .mixer{grid-template-columns:repeat(3,1fr)}
  #app{overflow-y:auto}
  .controls{min-height:auto}
}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-card">
    <h1>MVXP REHEARSAL CONSOLE</h1>
    <div class="sub">DON'T STOP BELIEVIN' · E MAJOR · 124 BPM · 4/4</div>
    <div id="drop" class="drop">
      <p><b>Loading stems…</b><br>If they don't auto-load, drop the 5 stem MP3s here (or click to browse).</p>
      <input id="fileinput" type="file" accept="audio/*" multiple class="hidden">
    </div>
    <div class="stemgrid" id="stemgrid"></div>
    <button id="startbtn" class="startbtn">START REHEARSAL</button>
    <div class="loadstatus" id="loadstatus"></div>
    <div class="loaderr" id="loaderr"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="apphead">
    <div class="apptitle">DON'T STOP BELIEVIN'</div>
    <div class="appmeta">
      <span class="metachip">E MAJOR</span>
      <span class="metachip">124 BPM</span>
      <span class="metachip">4/4</span>
    </div>
  </div>
  <div class="topbar">
    <div class="mixer" id="mixer"></div>
    <div class="transport">
      <button class="playbtn" id="playbtn" aria-label="Play/Pause">
        <svg id="playicon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div class="seekwrap">
        <div class="seektrack"><div class="seekfill" id="seekfill"></div></div>
        <div class="markers" id="markers"></div>
        <input class="seek" id="seek" type="range" min="0" max="1000" value="0">
      </div>
      <div class="time"><b id="tcur">0:00.0</b> / <span id="ttot">0:00.0</span></div>
    </div>
  </div>

  <div class="main">
    <div class="lyricpanel">
      <div class="sectiontag" id="sectiontag">—</div>
      <div class="sectiontime" id="sectiontime"></div>
      <div class="lyriclines" id="lyriclines"></div>
      <div class="nextsec" id="nextsec"></div>
    </div>

    <div class="controls">
      <div class="card">
        <h3>DRUM BEAT GUIDE <span class="mini">124 BPM · 4/4</span></h3>
        <div class="beatgrid" id="beatgrid"></div>
        <div class="beatbeam"><div class="beambar" id="beambar"></div></div>
        <div class="beatctrls"><button class="tinybtn" id="metrobtn">METRONOME</button></div>
      </div>
      <div class="card">
        <h3>CHORD PADS <span class="mini">1 2 3 4</span></h3>
        <div class="padgrid" id="chordpads"></div>
        <div class="instsel" id="instsel">
          <button class="instbtn on" data-inst="guitar">ACOUSTIC GUITAR</button>
          <button class="instbtn" data-inst="organ">PIPE ORGAN</button>
        </div>
      </div>
      <div class="card">
        <h3>DRUM PADS <span class="mini">A S D F</span></h3>
        <div class="padgrid" id="drumpads"></div>
      </div>
    </div>
  </div>
</div>

/* ================= AUDIO ENGINE ================= */
let AC = null;
const stemBuffers = {}, drumBuffers = {}, stemNodes = {};
let masterGain = null, chordBus = null;
let startTime = 0, pauseOffset = 0, playing = false, duration = 0;

function noteFreq(n){
  const m = n.match(/^([A-G])([#b]?)(\d)$/);
  const semis = {C:0,D:2,E:4,F:5,G:7,A:9,B:11};
  let s = semis[m[1]] + (m[2]==='#'?1:m[2]==='b'?-1:0);
  const midi = s + (parseInt(m[3])+1)*12;
  return 440*Math.pow(2,(midi-69)/12);
}

/* base64 -> AudioBuffer */
function b64ToBytes(b64){
  const bin=atob(b64), len=bin.length, bytes=new Uint8Array(len);
  for(let i=0;i<len;i++) bytes[i]=bin.charCodeAt(i);
  return bytes.buffer;
}
async function loadEmbeddedDrums(){
  for(const name of DRUM_ORDER){
    if(DRUM_B64[name]){
      try{ drumBuffers[name]=await AC.decodeAudioData(b64ToBytes(DRUM_B64[name])); }catch(e){}
    }
  }
}

const loadState = {};
CONFIG.stems.forEach(s=>loadState[s]=false);

async function tryFetchStems(){
  const status=document.getElementById('loadstatus');
  for(const name of CONFIG.stems){
    if(loadState[name]) continue;
    status.textContent='Loading '+name+'…';
    try{
      const r=await fetch(name+'.mp3'); if(!r.ok) throw 0;
      stemBuffers[name]=await AC.decodeAudioData(await r.arrayBuffer());
      loadState[name]=true; markStem(name);
    }catch(e){}
  }
  status.textContent = CONFIG.stems.every(s=>loadState[s]) ? 'All stems loaded ✓' : 'Drop the missing stems above.';
  refreshStart();
}
function markStem(name){ const c=document.querySelector(`.stemchip[data-s="${name}"]`); if(c) c.classList.add('ok'); }
function refreshStart(){ if(CONFIG.stems.every(s=>loadState[s])) document.getElementById('startbtn').classList.add('ready'); }

function initDrop(){
  const grid=document.getElementById('stemgrid');
  CONFIG.stems.forEach(s=>{ const d=document.createElement('div'); d.className='stemchip'; d.dataset.s=s; d.textContent=s; grid.appendChild(d); });
  const drop=document.getElementById('drop'), input=document.getElementById('fileinput');
  drop.addEventListener('click',()=>input.click());
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('hot')});
  drop.addEventListener('dragleave',()=>drop.classList.remove('hot'));
  drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('hot');handleFiles(e.dataTransfer.files)});
  input.addEventListener('change',e=>handleFiles(e.target.files));
}
async function handleFiles(files){
  for(const f of files){
    const base=f.name.replace(/\.[^.]+$/,'');
    const match=CONFIG.stems.find(s=>s.toLowerCase()===base.toLowerCase())
             || CONFIG.drumFiles.find(d=>d.toLowerCase()===base.toLowerCase());
    if(!match) continue;
    try{
      const buf=await AC.decodeAudioData(await f.arrayBuffer());
      if(CONFIG.stems.includes(match)){ stemBuffers[match]=buf; loadState[match]=true; markStem(match); }
      else drumBuffers[match]=buf;
    }catch(e){ document.getElementById('loaderr').textContent='Could not decode '+f.name; }
  }
  refreshStart();
}

/* ================= PLAYBACK ================= */
function buildGraph(){
  masterGain=AC.createGain(); masterGain.connect(AC.destination);
  chordBus=AC.createGain(); chordBus.gain.value=0.9;
  // gentle master reverb-ish send for chords via convolver (short)
  const conv=AC.createConvolver(); conv.buffer=makeIR(1.6,2.2);
  const wet=AC.createGain(); wet.gain.value=0.18;
  chordBus.connect(masterGain);
  chordBus.connect(conv); conv.connect(wet); wet.connect(masterGain);
  duration=Math.max(...CONFIG.stems.map(s=>stemBuffers[s]?stemBuffers[s].duration:0));
  CONFIG.stems.forEach(name=>{
    const g=AC.createGain(); g.connect(masterGain); g.gain.value=0.85;
    stemNodes[name]={gain:g, source:null, muted:false, solo:false, vol:0.85};
  });
}
function makeIR(dur,decay){
  const rate=AC.sampleRate, len=rate*dur, buf=AC.createBuffer(2,len,rate);
  for(let ch=0;ch<2;ch++){ const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay); } }
  return buf;
}
function anySolo(){ return CONFIG.stems.some(s=>stemNodes[s].solo); }
function applyMix(){
  const solo=anySolo();
  CONFIG.stems.forEach(name=>{
    const n=stemNodes[name]; const audible=solo?n.solo:!n.muted;
    n.gain.gain.setTargetAtTime(audible?n.vol:0.0001, AC.currentTime, 0.02);
  });
}
function startPlayback(offset){
  CONFIG.stems.forEach(name=>{
    if(!stemBuffers[name]) return;
    const src=AC.createBufferSource(); src.buffer=stemBuffers[name];
    src.connect(stemNodes[name].gain); src.start(0,offset);
    stemNodes[name].source=src;
  });
  startTime=AC.currentTime; pauseOffset=offset; playing=true; applyMix(); updatePlayIcon();
}
function stopPlayback(){ CONFIG.stems.forEach(name=>{ const s=stemNodes[name].source; if(s){try{s.stop()}catch(e){} stemNodes[name].source=null;} }); }
function curTime(){ return playing?Math.min(pauseOffset+(AC.currentTime-startTime),duration):pauseOffset; }
function togglePlay(){
  if(AC.state==='suspended') AC.resume();
  if(playing){ pauseOffset=curTime(); stopPlayback(); playing=false; updatePlayIcon(); }
  else { if(pauseOffset>=duration-0.05) pauseOffset=0; startPlayback(pauseOffset); }
}
function seekTo(t){
  t=Math.max(0,Math.min(t,duration));
  const was=playing; if(playing) stopPlayback();
  pauseOffset=t; if(was) startPlayback(t); else playing=false;
  renderSync(t,true);
}
function updatePlayIcon(){
  document.getElementById('playicon').innerHTML=playing
    ?'<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>':'<path d="M8 5v14l11-7z"/>';
}

/* ================= MIXER ================= */
function drawWave(canvas,buf){
  const ctx=canvas.getContext('2d'), W=canvas.width=canvas.clientWidth*2, H=canvas.height=60;
  ctx.clearRect(0,0,W,H); if(!buf) return;
  const data=buf.getChannelData(0), step=Math.floor(data.length/W);
  ctx.strokeStyle='rgba(34,224,255,0.55)'; ctx.lineWidth=1; ctx.beginPath();
  for(let i=0;i<W;i++){ let mn=1,mx=-1; for(let j=0;j<step;j++){const v=data[i*step+j]||0; if(v<mn)mn=v; if(v>mx)mx=v;} ctx.moveTo(i,(1+mn)*H/2); ctx.lineTo(i,(1+mx)*H/2); }
  ctx.stroke();
}
function buildMixer(){
  const m=document.getElementById('mixer');
  CONFIG.stems.forEach(name=>{
    const el=document.createElement('div'); el.className='stem';
    el.innerHTML=`<div class="name">${name}</div><canvas class="wave"></canvas>
      <div class="row"><button class="sbtn mute">MUTE</button><button class="sbtn solo">SOLO</button>
      <input class="vol" type="range" min="0" max="1" step="0.01" value="0.85"></div>`;
    m.appendChild(el);
    drawWave(el.querySelector('.wave'), stemBuffers[name]);
    el.querySelector('.mute').addEventListener('click',ev=>{const n=stemNodes[name];n.muted=!n.muted;ev.target.classList.toggle('on-mute',n.muted);applyMix();});
    el.querySelector('.solo').addEventListener('click',ev=>{const n=stemNodes[name];n.solo=!n.solo;ev.target.classList.toggle('on-solo',n.solo);applyMix();});
    el.querySelector('.vol').addEventListener('input',ev=>{const n=stemNodes[name];n.vol=parseFloat(ev.target.value);applyMix();});
  });
}

/* Shrink font until all lines fit the available height (never clip last line) */
function autofitLyrics(){
  const wrap=document.getElementById('lyriclines');
  const avail=wrap.clientHeight; if(avail<=0) return;
  let fs=44;                       // start large
  const nLines=wrap.querySelectorAll('.lline').length;
  const setFS=v=>{
    wrap.querySelectorAll('.ltext').forEach(t=>t.style.fontSize=v+'px');
    wrap.querySelectorAll('.lchord').forEach(c=>c.style.fontSize=Math.max(12,v*0.5)+'px');
    // vertical gap scales with font
    wrap.style.gap='0px';
    wrap.querySelectorAll('.lline').forEach(l=>l.style.marginBottom=(v*0.28)+'px');
  };
  setFS(fs);
  // reduce until content fits, floor 16px
  let guard=0;
  while(wrap.scrollHeight>avail && fs>16 && guard<80){ fs-=1.5; setFS(fs); guard++; }
}
window.addEventListener('resize',()=>{ if(!document.getElementById('app').classList.contains('hidden')) autofitLyrics(); });

function activeLineChord(sec, tRel, secDur){
  const nLines=sec.lines.length, perLine=secDur/nLines;
  let li=Math.min(nLines-1,Math.floor(tRel/perLine));
  const line=sec.lines[li], lineStart=li*perLine, nCh=line.chords.length;
  const ci=Math.min(nCh-1,Math.floor((tRel-lineStart)/(perLine/nCh)));
  return {li,ci};
}

/* ================= SYNC ================= */
function renderSync(t,force){
  let idx=SECTIONS.findIndex(s=>t>=s.start && t<s.end);
  if(idx===-1) idx=t<SECTIONS[0].start?0:SECTIONS.length-1;
  if(idx!==curSectionIdx){
    const wrap=document.getElementById('lyriclines');
    if(!force){ wrap.classList.add('swap'); setTimeout(()=>{buildLyricsFor(idx);wrap.classList.remove('swap');},300); }
    else buildLyricsFor(idx);
    curSectionIdx=idx;
  }
  const sec=SECTIONS[idx], secDur=Math.max(0.1,sec.end-sec.start);
  const tRel=Math.max(0,Math.min(secDur,t-sec.start));
  const {li,ci}=activeLineChord(sec,tRel,secDur);
  document.querySelectorAll('#lyriclines .lline').forEach(r=>{
    const isA=parseInt(r.dataset.li)===li; r.classList.toggle('active',isA);
    r.querySelectorAll('.lchord').forEach(cs=>cs.classList.toggle('active',isA&&parseInt(cs.dataset.ci)===ci));
  });
  const activeChord=sec.lines[li]?sec.lines[li].chords[ci]:null;
  PAD_ORDER.forEach(name=>{ const p=document.querySelector(`.pad.chord[data-c="${name}"]`); if(p) p.classList.toggle('live',name===activeChord); });

  document.getElementById('tcur').textContent=fmt(t);
  document.getElementById('seekfill').style.width=(t/duration*100)+'%';
  if(!seekDragging) document.getElementById('seek').value=t/duration*1000;

  const beat=t/SEC_PER_BEAT, posInBar=(beat%CONFIG.beatsPerBar)/CONFIG.beatsPerBar;
  document.getElementById('beambar').style.left=(posInBar*100)+'%';
  highlightBeatCol(Math.floor((t/SEC_PER_BEAT)*2)%8);
  handleMetro(t);
}

/* =========================================================
   NEW ACOUSTIC GUITAR — improved Karplus-Strong
   - pick-shaped burst (not pure noise) for less harshness
   - per-string lowpass + body resonance (bandpass)
   - dynamics stagger for a natural downstrum
   ========================================================= */
let currentInst='guitar';
function hitChord(name){
  flash(`.pad.chord[data-c="${name}"]`);
  const notes=PAD_CHORDS[name].notes;
  if(currentInst==='guitar') strumGuitar(notes); else playOrgan(notes);
}
function strumGuitar(noteNames){
  const now=AC.currentTime;
  // shared soft body resonance bus
  const body=AC.createBiquadFilter(); body.type='peaking'; body.frequency.value=180; body.gain.value=5; body.Q.value=1.0;
  const bodyGain=AC.createGain(); bodyGain.gain.value=0.9;
  body.connect(bodyGain); bodyGain.connect(chordBus);
  noteNames.forEach((nn,i)=>{
    const f=noteFreq(nn);
    const t0=now + i*0.022 + Math.random()*0.004;      // downstrum stagger + humanize
    pluckString(f, t0, 1.0 - i*0.04, body);
  });
}
function pluckString(freq, t0, amp, dest){
  const sr=AC.sampleRate;
  const N=Math.round(sr/freq);
  const dur=2.4;
  const buf=AC.createBuffer(1, Math.floor(sr*dur), sr);
  const d=buf.getChannelData(0);
  // Excitation: short filtered noise burst shaped like a pick attack
  const wt=new Float32Array(N);
  for(let k=0;k<N;k++){
    // pick position comb-ish: emphasise mid, soften edges
    const env=Math.sin(Math.PI*k/N);
    wt[k]=(Math.random()*2-1)*env;
  }
  // low-pass the excitation once (warmer, less zingy)
  let lpf=0; const a=0.5;
  for(let k=0;k<N;k++){ lpf=lpf+a*(wt[k]-lpf); wt[k]=lpf; }
  // Karplus-Strong with tunable damping (higher freq = more damping)
  const damp=0.995 - Math.min(0.01, freq/40000);
  let idx=0, prev=0;
  for(let s=0;s<d.length;s++){
    const cur=wt[idx];
    const out=(cur+prev)*0.5*damp;
    prev=out; wt[idx]=out; d[s]=out; idx=(idx+1)%N;
  }
  const src=AC.createBufferSource(); src.buffer=buf;
  // tone shaping: gentle lowpass rolloff + slight highpass to remove mud
  const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.setValueAtTime(4200,t0); lp.frequency.exponentialRampToValueAtTime(2200,t0+1.6); lp.Q.value=0.4;
  const hp=AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=90;
  const g=AC.createGain();
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(0.55*amp,t0+0.006);   // fast attack
  g.gain.exponentialRampToValueAtTime(0.12*amp,t0+0.5);     // initial decay
  g.gain.exponentialRampToValueAtTime(0.0001,t0+2.2);       // long tail
  src.connect(hp); hp.connect(lp); lp.connect(g);
  g.connect(dest); g.connect(chordBus);   // dry+body
  src.start(t0); src.stop(t0+dur);
}

/* =========================================================
   NEW PIPE ORGAN — smooth, no "spasms"
   - sustained additive drawbar tone, all notes together
   - one shared amp envelope (no per-partial retrigger clicks)
   - very slight, SLOW detune chorus (steady, not wobbly)
   ========================================================= */
let organVoices=[]; // allow overlap without glitch
function playOrgan(noteNames){
  const now=AC.currentTime;
  const voiceGain=AC.createGain();
  const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2600; lp.Q.value=0.3;
  voiceGain.connect(lp); lp.connect(chordBus);
  // smooth swell in, hold, smooth release — no exponential spikes
  voiceGain.gain.setValueAtTime(0.0001,now);
  voiceGain.gain.linearRampToValueAtTime(0.30, now+0.06);   // attack
  voiceGain.gain.setValueAtTime(0.30, now+1.4);             // sustain hold
  voiceGain.gain.linearRampToValueAtTime(0.0001, now+2.6);  // release
  // Drawbar registration (16',8',5⅓',4',2⅔',2') — classic warm church blend
  const drawbars=[
    {mult:0.5,  lvl:0.55}, // sub / 16'
    {mult:1.0,  lvl:1.00}, // fundamental / 8'
    {mult:1.5,  lvl:0.35}, // quint / 5 1/3'
    {mult:2.0,  lvl:0.50}, // octave / 4'
    {mult:3.0,  lvl:0.22}, // 2 2/3'
    {mult:4.0,  lvl:0.18}, // 2'
  ];
  const oscs=[];
  noteNames.forEach(nn=>{
    const f=noteFreq(nn);
    drawbars.forEach(db=>{
      // two slightly detuned sines per drawbar = steady chorus, NOT vibrato
      [-3,3].forEach(det=>{
        const o=AC.createOscillator(); o.type='sine';
        o.frequency.value=f*db.mult; o.detune.value=det;
        const g=AC.createGain(); g.gain.value=db.lvl*0.11;
        o.connect(g); g.connect(voiceGain);
        o.start(now); o.stop(now+2.7);
        oscs.push(o);
      });
    });
  });
}

/* ================= KEYBOARD ================= */
window.addEventListener('keydown',e=>{
  if(document.getElementById('app').classList.contains('hidden')) return;
  if(e.repeat) return;
  if(e.code==='Space'){ e.preventDefault(); togglePlay(); return; }
  const k=e.key.toLowerCase();
  let di=DRUM_KEYS.indexOf(k); if(di===-1) di=DRUM_KEYS_ALT.indexOf(k);
  if(di!==-1){ hitDrum(DRUM_ORDER[di]); return; }
  const ci=PAD_KEYS.indexOf(e.key);
  if(ci!==-1) hitChord(PAD_ORDER[ci]);
});
document.addEventListener('DOMContentLoaded',()=>{
  const mb=document.getElementById('metrobtn');
  if(mb) mb.addEventListener('click',e=>{ metroOn=!metroOn; e.target.classList.toggle('on',metroOn); });
});

/* ================= LOOP + BOOT ================= */
function loop(){
  if(AC && masterGain){
    const t=curTime(); renderSync(t,false);
    if(playing && t>=duration-0.02){ playing=false; stopPlayback(); updatePlayIcon(); }
  }
  requestAnimationFrame(loop);
}
function startApp(){
  document.getElementById('loader').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  buildGraph(); buildMixer(); buildMarkers(); initTransport(); buildBeatGrid(); buildPads();
  requestAnimationFrame(()=>{ buildLyricsFor(0); curSectionIdx=0; requestAnimationFrame(loop); });
}
window.addEventListener('load',async ()=>{
  initDrop();
  AC=new (window.AudioContext||window.webkitAudioContext)();
  await loadEmbeddedDrums();
  await tryFetchStems();
  document.getElementById('startbtn').addEventListener('click',()=>{ if(AC.state==='suspended') AC.resume(); startApp(); });
  const mb=document.getElementById('metrobtn');
  if(mb && !mb._bound){ mb._bound=true; mb.addEventListener('click',e=>{ metroOn=!metroOn; e.target.classList.toggle('on',metroOn); }); }
});
</script></body></html>
